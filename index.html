const ROUTE_DISPLAY = {
  '1':{n:1,short:'Kirkman/University',t:'#fff'},
  '2':{n:2,short:'Simmons & Prater',t:'#fff'},
  '3':{n:3,short:'Mill Street',t:'#000'},
  '4':{n:4,short:'Oak Park',t:'#fff'},
  '5':{n:5,short:'Nelson Road',t:'#fff'}
};
function nowCentral(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Chicago'}));}
const clockEl=document.getElementById('clock');
setInterval(()=>{clockEl.textContent=nowCentral().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
clockEl.textContent=nowCentral().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const map=L.map('map',{zoomControl:true}).setView([30.22392,-93.21792],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors',maxZoom:19}).addTo(map);
const busMarkers={};
function drawRoutes(){
  const shapeToRoute={};
  Object.entries(TRANSIT.routeInfo).forEach(([rn,ri])=>{shapeToRoute[ri.shapeNumber]=rn;});
  Object.entries(TRANSIT.compactShapes).forEach(([sn,coords])=>{
    const rn=shapeToRoute[+sn];
    if(!rn||!TRANSIT.routeInfo[rn])return;
    const valid=coords.filter(([a,b])=>!isNaN(a)&&!isNaN(b));
    if(valid.length<2)return;
    L.polyline(valid,{color:TRANSIT.routeInfo[rn].colour,weight:5,opacity:.85}).addTo(map);
  });
}
function drawStops(){
  Object.entries(TRANSIT.stopMap).forEach(([sn,[name,lat,lon]])=>{
    if(!lat||!lon)return;
    L.circleMarker([lat,lon],{radius:4,color:'#fff',weight:1,fillColor:'#1e3a6e',fillOpacity:.9}).bindTooltip(name,{direction:'top'}).addTo(map);
  });
}
function busIcon(c,t,n){
  const s='<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="'+c+'" stroke="#fff" stroke-width="2"/><text x="18" y="23" text-anchor="middle" font-size="14" font-weight="900" font-family="Arial,sans-serif" fill="'+t+'">'+n+'</text></svg>';
  return L.divIcon({html:s,className:'',iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]});
}
function parseTime(hms){
  const [h,m,s]=hms.split(':').map(Number);
  const d=nowCentral();
  d.setHours(h,m,s||0,0);
  return d;
}
function getRouteStatus(rn){
  const trips=TRANSIT.routeTrips[String(rn)];
  if(!trips||!trips.length)return{status:'No service',stopName:null,lat:null,lon:null,etaMin:null,prog:0};
  const now=nowCentral();
  for(const trip of trips){
    if(!trip.length)continue;
    const first=parseTime(trip[0][1]);
    const last=parseTime(trip[trip.length-1][1]);
    if(now>=first&&now<=last){
      let next=null;
      for(const[sn,t]of trip){const st=parseTime(t);if(st>now){next={sn,stopTime:st};break;}}
      if(!next)next={sn:trip[trip.length-1][0],stopTime:last};
      const info=TRANSIT.stopMap[next.sn];
      const etaMin=Math.max(0,Math.round((next.stopTime-now)/60000));
      const prog=Math.min(100,Math.max(0,Math.round((now-first)/(last-first)*100)));
      return{status:'On route',stopName:info?info[0]:'Stop #'+next.sn,lat:info?info[1]:null,lon:info?info[2]:null,etaMin,prog};
    }
    if(now<first){
      return{status:'Next: '+first.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),stopName:null,lat:null,lon:null,etaMin:null,prog:0};
    }
  }
  return{status:'Last trip done',stopName:null,lat:null,lon:null,etaMin:null,prog:0};
}
function etaC(m){return m<=1?'en':m<=5?'es':m<=15?'eo':'ef';}
function renderCards(){
  const cards=document.getElementById('cards');
  cards.innerHTML='';
  const ticks=[];
  ['1','2','3','4','5'].forEach(rn=>{
    const rd=ROUTE_DISPLAY[rn];
    const ri=TRANSIT.routeInfo[rn];
    const colour=ri?ri.colour:'#888';
    const s=getRouteStatus(rn);
    const ec=s.etaMin!==null?etaC(s.etaMin):'ef';
    const en=s.etaMin!==null?(s.etaMin===0?'&#9733;':s.etaMin):'&mdash;';
    const bar=s.stopName?'<div class="pb-w"><div class="pb-f" style="width:'+s.prog+'%;background:'+colour+'"></div></div>':'';
    const div=document.createElement('div');
    div.className='route-card';
    div.innerHTML='<div class="route-header"><div class="route-badge" style="background:'+colour+';color:'+rd.t+'">'+rd.n+'</div><div class="route-info"><h2>'+(ri?ri.name:'Route '+rn)+'</h2><div class="sl">'+s.status+'</div></div></div><div class="stop-sec"><div class="stop-lbl">Next Stop</div>'+(s.stopName?'<div class="next-sn">'+s.stopName+'</div><div class="eta-row"><span class="eta-num '+ec+'">'+en+'</span><span class="eta-lbl">'+(s.etaMin===0?'Arriving':'min away')+'</span></div>'+bar:'<div class="no-bus">'+s.status+'</div>')+'</div>';
    cards.appendChild(div);
    if(s.lat&&s.lon){
      const icon=busIcon(colour,rd.t,rd.n);
      if(busMarkers[rn]){busMarkers[rn].setLatLng([s.lat,s.lon]).setIcon(icon);}
      else{busMarkers[rn]=L.marker([s.lat,s.lon],{icon}).bindPopup('<b>Route '+rd.n+'</b><br>'+(s.stopName||'')).addTo(map);}
    } else if(busMarkers[rn]){map.removeLayer(busMarkers[rn]);delete busMarkers[rn];}
    ticks.push('Route '+rd.n+': '+(s.stopName||'No active trip')+' - '+(s.etaMin!==null?s.etaMin+' min':'TBD'));
  });
  document.getElementById('ticker').textContent=ticks.join(' · ');
  document.getElementById('last-update').textContent='Updated '+nowCentral().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
drawRoutes();
drawStops();
renderCards();
setInterval(()=>renderCards(),30000);
</script>
