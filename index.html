<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transit Lobby Display</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0f1e;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1526;
      padding: 10px 20px;
      border-bottom: 2px solid #1e3a6e;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #7ec8f5;
      text-transform: uppercase;
    }
    #clock {
      font-size: 1.6rem;
      font-weight: bold;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    #last-update {
      font-size: 0.75rem;
      color: #5a8aaa;
      text-align: right;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Map iframe ── */
    #map-frame {
      flex: 1;
      border: none;
      min-width: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background: #0d1526;
      border-left: 2px solid #1e3a6e;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-title {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #5a8aaa;
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e3a6e;
    }

    /* ── Route Card ── */
    .route-card {
      background: #111c35;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e3a6e;
    }

    .route-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
    }

    .route-badge {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .route-info h2 {
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .route-info .status-line {
      font-size: 0.72rem;
      color: #7ec8f5;
      margin-top: 2px;
    }

    .stop-section {
      border-top: 1px solid #1e3a6e;
      padding: 8px 12px 10px;
    }

    .stop-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5a8aaa;
      margin-bottom: 4px;
    }

    .next-stop-name {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .eta-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 4px;
    }

    .eta-minutes {
      font-size: 1.8rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .eta-label {
      font-size: 0.75rem;
      color: #7ec8f5;
    }

    /* ETA colour coding */
    .eta-now    { color: #ff4d4d; }
    .eta-soon   { color: #f7c224; }
    .eta-ok     { color: #5fb406; }
    .eta-future { color: #2e9afe; }

    /* Progress bar inside card */
    .progress-bar-wrap {
      margin-top: 6px;
      background: #1e3a6e;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s linear;
    }

    /* Alert banner */
    .alert-banner {
      font-size: 0.7rem;
      background: #3a1010;
      border-top: 1px solid #7a1a1a;
      color: #ff9999;
      padding: 5px 12px;
    }

    /* No bus active */
    .no-bus {
      font-size: 0.8rem;
      color: #5a8aaa;
      font-style: italic;
      padding: 4px 0 2px;
    }

    /* Scrollbar */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: #0a0f1e; }
    .sidebar::-webkit-scrollbar-thumb { background: #1e3a6e; border-radius: 2px; }

    /* Ticker at bottom */
    .ticker-bar {
      background: #060c1a;
      border-top: 1px solid #1e3a6e;
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;
      height: 26px;
      line-height: 26px;
      font-size: 0.72rem;
      color: #5a8aaa;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker 60s linear infinite;
      padding-left: 100%;
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>&#128652; Live Bus Tracker</h1>
  </div>
  <div style="text-align:right;">
    <div id="clock">--:-- --</div>
    <div id="last-update">Refreshing every 60s</div>
  </div>
</header>

<div class="main">
  <!-- Live TransitFare Public Map -->
  <iframe
    id="map-frame"
    src="https://america.transitfare.com/#/public-map-v2?name=31&routes%5B1,2,3,4,5%5D="
    allowfullscreen
    title="TransitFare Live Map">
  </iframe>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Next Stop · All Routes</div>
    <div id="route-cards">
      <!-- Cards injected by JS -->
      <div style="text-align:center;color:#5a8aaa;padding:20px;font-size:0.8rem;">Loading route data&hellip;</div>
    </div>
  </aside>
</div>

<div class="ticker-bar">
  <span class="ticker-inner" id="ticker-text">
    Connecting to TransitFare API&hellip;
  </span>
</div>

<script>
  /* ═══════════════════════════════════════════════
     CONFIG  – agency ID is 31 (Lake Charles Transit)
  ══════════════════════════════════════════════ */
  const AGENCY_ID   = 31;
  const API_BASE    = 'https://america.transitfare.com/api/1/public';
  const REFRESH_MS  = 60000;   // match TransitFare mapRefresh setting

  /* Route definitions (from /routes/0/31 API) */
  const ROUTES = [
    { number: 1, name: 'Route 1 - Kirkman/University', colour: '#ff0000', textColour: '#ffffff' },
    { number: 2, name: 'Route 2 - Simmons and Prater', colour: '#ff6600', textColour: '#ffffff' },
    { number: 3, name: 'Route 3 - Mill Street',        colour: '#f7c224', textColour: '#000000' },
    { number: 4, name: 'Route 4 - Oak Park',           colour: '#5fb406', textColour: '#ffffff' },
    { number: 5, name: 'Route 5 Nelson Road',          colour: '#2e9afe', textColour: '#ffffff' },
  ];

  /* ── Clock ── */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ── Helpers ── */
  async function apiFetch(path) {
    const res = await fetch(API_BASE + path);
    if (!res.ok) throw new Error('HTTP ' + res.status + ' for ' + path);
    return res.json();
  }

  function todayDate() {
    return new Date().toISOString().split('T')[0];
  }

  /* Convert "HH:MM:SS" local stop time to today's UTC Date */
  function stopTimeToDate(timeStr) {
    const [h, m, s] = timeStr.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, s || 0, 0);
    return d;
  }

  function etaClass(minutes) {
    if (minutes <= 1)  return 'eta-now';
    if (minutes <= 5)  return 'eta-soon';
    if (minutes <= 15) return 'eta-ok';
    return 'eta-future';
  }

  /* ── Build route data ── */
  async function fetchRouteData() {
    const [stopsArr, tripsArr] = await Promise.all([
      apiFetch('/stops/' + AGENCY_ID),
      apiFetch('/scheduledTrips/' + todayDate() + '/' + AGENCY_ID),
    ]);

    /* Build stop lookup: stopNumber → stopName */
    const stopMap = {};
    stopsArr.forEach(s => { stopMap[String(s.stopNumber)] = s.stopName; });

    const now = new Date();
    const results = [];

    for (const route of ROUTES) {
      /* Find active or upcoming trip for this route */
      const routeTrips = tripsArr
        .filter(t => String(t.routeNumber) === String(route.number))
        .sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

      let activeTrip   = null;
      let nextStopName = null;
      let etaMinutes   = null;
      let tripStatus   = 'No scheduled trips today';
      let progressPct  = 0;
      let alerts       = [];

      /* Find the trip happening right now */
      for (const trip of routeTrips) {
        const start = new Date(trip.startTime);
        const end   = new Date(trip.endTime);

        if (now >= start && now <= end) {
          activeTrip = trip;
          tripStatus = 'On route';
          break;
        }
        /* Next upcoming trip */
        if (now < start) {
          activeTrip = trip;
          tripStatus = 'Next departure ' + start.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
          break;
        }
      }

      if (activeTrip) {
        const stops = activeTrip.stopTimes || [];

        /* Find next stop (first stop with arrivalTime after now, or first stop overall) */
        let nextStop = null;
        for (const st of stops) {
          if (!st.arrivalTime) continue;
          const arrDate = stopTimeToDate(st.arrivalTime);
          if (arrDate > now) {
            nextStop = st;
            break;
          }
        }
        /* Fallback: first stop */
        if (!nextStop && stops.length) nextStop = stops[0];

        if (nextStop) {
          nextStopName = stopMap[String(nextStop.stopNumber)] || 'Stop #' + nextStop.stopNumber;

          if (nextStop.arrivalTime) {
            const arrDate  = stopTimeToDate(nextStop.arrivalTime);
            etaMinutes = Math.round((arrDate - now) / 60000);
            if (etaMinutes < 0) etaMinutes = 0;
          }

          /* Progress within trip */
          const tripStart  = new Date(activeTrip.startTime);
          const tripEnd    = new Date(activeTrip.endTime);
          const elapsed    = now - tripStart;
          const duration   = tripEnd - tripStart;
          progressPct      = Math.min(100, Math.max(0, Math.round(elapsed / duration * 100)));
        }

        /* Public alerts */
        if (activeTrip.publicAlerts && activeTrip.publicAlerts.length) {
          alerts = activeTrip.publicAlerts;
        }
      }

      results.push({
        route, activeTrip, nextStopName, etaMinutes, tripStatus, progressPct, alerts,
      });
    }

    return { results, stopMap };
  }

  /* ── Render sidebar cards ── */
  function renderCards(results) {
    const container = document.getElementById('route-cards');
    container.innerHTML = '';

    results.forEach(({ route, nextStopName, etaMinutes, tripStatus, progressPct, alerts }) => {
      const card = document.createElement('div');
      card.className = 'route-card';

      const etaC = etaMinutes !== null ? etaClass(etaMinutes) : 'eta-future';
      const etaTxt = etaMinutes !== null
        ? (etaMinutes === 0 ? 'Arriving' : etaMinutes + ' min')
        : '—';
      const etaNum = etaMinutes !== null
        ? (etaMinutes === 0 ? '&#x2605;' : etaMinutes)
        : '—';

      const progressBar = nextStopName
        ? `<div class="progress-bar-wrap">
             <div class="progress-bar-fill" style="width:${progressPct}%;background:${route.colour};"></div>
           </div>`
        : '';

      const alertHtml = alerts.length
        ? `<div class="alert-banner">&#x26A0; ${alerts[0]}</div>`
        : '';

      card.innerHTML = `
        <div class="route-header">
          <div class="route-badge"
               style="background:${route.colour};color:${route.textColour};">
            ${route.number}
          </div>
          <div class="route-info">
            <h2>${route.name}</h2>
            <div class="status-line">${tripStatus}</div>
          </div>
        </div>
        <div class="stop-section">
          <div class="stop-label">Next Stop</div>
          ${nextStopName
            ? `<div class="next-stop-name">${nextStopName}</div>
               <div class="eta-row">
                 <span class="eta-minutes ${etaC}">${etaNum}</span>
                 <span class="eta-label">${etaMinutes === 0 ? '' : 'min away'}</span>
               </div>
               ${progressBar}`
            : `<div class="no-bus">${tripStatus}</div>`
          }
        </div>
        ${alertHtml}
      `;

      container.appendChild(card);
    });
  }

  /* ── Ticker ── */
  function updateTicker(results) {
    const parts = results.map(({ route, nextStopName, etaMinutes }) => {
      const eta = etaMinutes !== null ? etaMinutes + ' min' : 'TBD';
      return `Route ${route.number}: ${nextStopName || 'No active trip'} – ${eta}`;
    });
    document.getElementById('ticker-text').textContent = parts.join('   ·   ');
  }

  /* ── Main refresh loop ── */
  async function refresh() {
    try {
      const { results } = await fetchRouteData();
      renderCards(results);
      updateTicker(results);
      document.getElementById('last-update').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch (err) {
      console.error('TransitFare refresh error:', err);
      document.getElementById('last-update').textContent = 'Update failed – retrying…';
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
